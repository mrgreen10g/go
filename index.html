<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eva | Матрица Судьбы 🔮</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --tg-color: #24A1DE; --bg-dark: #05060a; --gold: #ffd700; --mystic: #7d5fff; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-dark); 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 0;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* Космический фон */
        .stars-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #161d31 0%, #05060a 100%);
        }
        .stars {
            position: absolute; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.4; animation: drift 60s linear infinite;
        }
        @keyframes drift { from {background-position: 0 0;} to {background-position: 1000px 1000px;} }

        .container { width: 100%; max-width: 380px; padding: 30px 20px; text-align: center; }

        /* Шапка */
        .header { margin-bottom: 40px; }
        h1 { font-size: 22px; line-height: 1.4; font-weight: 400; }
        .highlight { 
            color: var(--gold); font-weight: 800; font-size: 28px; 
            text-transform: uppercase; display: block; margin: 10px 0;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow { from { text-shadow: 0 0 10px var(--gold); } to { text-shadow: 0 0 25px var(--mystic); } }

        /* Кнопка ТГ */
        .btn-main { 
            background: linear-gradient(135deg, var(--tg-color), var(--mystic));
            color: white; padding: 20px; border-radius: 50px; 
            text-decoration: none; font-weight: bold; font-size: 18px; 
            display: flex; align-items: center; justify-content: center; gap: 12px;
            box-shadow: 0 8px 25px rgba(125, 95, 255, 0.3);
            border: none; width: 100%; cursor: pointer; transition: 0.3s;
        }

        /* Блок копирования */
        .copy-section { margin-top: 50px; background: rgba(255,255,255,0.03); border-radius: 24px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .copy-title { font-size: 15px; color: #ccc; margin-bottom: 15px; }
        .nick-btn { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--mystic); color: #fff;
            padding: 15px; border-radius: 15px; font-size: 18px; width: 100%; 
            cursor: pointer; margin-bottom: 20px; font-family: monospace;
        }
        
        /* Скрин поиска */
        .search-preview { 
            width: 100%; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Инструкция-Оверлей */
        #guideOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 1000; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            padding: 40px; text-align: center;
        }
        .arrow-top { position: absolute; top: 20px; right: 20px; font-size: 60px; color: var(--gold); animation: point 1s infinite alternate; }
        @keyframes point { from { transform: translate(0, 0); } to { transform: translate(10px, -10px); } }
        
        .overlay-text { font-size: 20px; line-height: 1.5; margin-bottom: 40px; }
        .close-btn { background: #fff; color: #000; padding: 15px 40px; border-radius: 50px; font-weight: bold; border: none; font-size: 16px; }

    </style>
</head>
<body>

<div class="stars-container"><div class="stars"></div></div>

<div class="container">
    <div class="header">
        <h1>🔮 Получи <span class="highlight">БЕСПЛАТНЫЙ</span> разбор матрицы судьбы! 🔮</h1>
        <p style="opacity: 0.7; font-size: 15px;">Напиши мне в Telegram свою дату рождения ✨</p>
    </div>

    <button class="btn-main" onclick="showGuide()">
        <i class="fab fa-telegram-plane"></i> НАПИШИТЕ МНЕ!
    </button>

    <div class="copy-section">
        <div class="copy-title">Или скопируй мой ник и найди меня прямо в поиске Telegram 👇</div>
        <button class="nick-btn" onclick="copyNick()">@diamond_evaa</button>
        
        <img src="https://raw.githubusercontent.com/mrgreen10g/go/main/search_preview.png" class="search-preview" alt="Eva Search">
        <p style="font-size: 12px; color: #666; margin-top: 10px;">Профиль должен выглядеть именно так</p>
    </div>
</div>

<div id="guideOverlay">
    <div class="arrow-top"><i class="fas fa-arrow-up"></i></div>
    <div class="overlay-text">
        <div style="font-size: 40px; margin-bottom: 20px;">⋮</div>
        <b>Нажми три точки</b> в углу TikTok<br><br>
        и выбери пункт:<br>
        <span style="color: var(--gold); font-size: 24px; border: 1px solid; padding: 5px 15px; border-radius: 10px; display: inline-block; margin-top: 10px;">
            ОТКРЫТЬ В БРАУЗЕРЕ
        </span>
    </div>
    <button class="close-btn" onclick="hideGuide()">ПОНЯЛ!</button>
</div>

<script>
    function showGuide() {
        document.getElementById('guideOverlay').style.display = 'flex';
        // Через секунду пытаемся открыть ссылку (у кого-то может сработать)
        setTimeout(() => { window.location.href = "tg://resolve?domain=diamond_evaa"; }, 1000);
    }
    
    function hideGuide() {
        document.getElementById('guideOverlay').style.display = 'none';
    }

    function copyNick() {
        navigator.clipboard.writeText('@diamond_evaa');
        alert('Ник скопирован! Вставь его в поиске Telegram 🕊️');
    }
</script>

</body>
</html>
