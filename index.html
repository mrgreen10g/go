<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eva | Матрица Судьбы 🔮</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --tg-color: #24A1DE; --bg-dark: #05060a; --gold: #ffd700; --mystic: #7d5fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-dark); color: white; font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow-x: hidden; text-align: center;
        }

        .stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 50%, #161d31 0%, #05060a 100%); }
        .stars { position: absolute; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.4; animation: drift 60s linear infinite; }
        @keyframes drift { from {background-position: 0 0;} to {background-position: 1000px 1000px;} }

        .container { width: 100%; max-width: 380px; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }

        /* Исправленная шапка */
        .header { margin-bottom: 35px; width: 100%; }
        h1 { 
            font-size: 16px; font-weight: 400; margin: 0; line-height: 1.4;
        }
        .highlight { 
            color: var(--gold); font-weight: 800; font-size: 20px; text-transform: uppercase; 
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); display: inline-block; margin: 5px 0;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow { from { text-shadow: 0 0 10px var(--gold); } to { text-shadow: 0 0 20px var(--mystic); } }
        
        .example { opacity: 0.6; font-size: 13px; margin-top: 12px; font-style: italic; color: #7d5fff; }

        .btn-main { 
            background: linear-gradient(135deg, var(--tg-color), var(--mystic));
            color: white; padding: 18px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; font-size: 17px; display: flex; align-items: center; 
            justify-content: center; gap: 12px; box-shadow: 0 8px 25px rgba(125, 95, 255, 0.3);
            border: none; width: 100%; cursor: pointer;
        }

        .copy-section { margin-top: 40px; background: rgba(255,255,255,0.03); border-radius: 24px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); width: 100%; }
        .copy-title { font-size: 13px; color: #ccc; margin-bottom: 15px; line-height: 1.4; }
        .nick-btn { background: rgba(0,0,0,0.3); border: 1px solid var(--mystic); color: #fff; padding: 15px; border-radius: 15px; font-size: 18px; width: 100%; cursor: pointer; margin-bottom: 20px; font-family: monospace; }
        .search-preview { width: 100%; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* Оверлей */
        #guideOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); z-index: 9999; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            padding: 30px; text-align: center;
        }
        .arrow-top { position: absolute; top: 30px; right: 40px; font-size: 60px; color: var(--gold); animation: point 0.8s infinite alternate; }
        @keyframes point { from { transform: translate(0, 0); } to { transform: translate(10px, -10px); } }
        
        .overlay-text { font-size: 18px; line-height: 1.6; color: white; margin-top: 20px; }
        .close-btn { background: #fff; color: #000; padding: 15px 50px; border-radius: 50px; font-weight: bold; border: none; font-size: 16px; margin-top: 40px; }

        /* Красивое уведомление о копировании */
        #toast {
            visibility: hidden; min-width: 250px; background-color: #7d5fff; color: white;
            text-align: center; border-radius: 12px; padding: 16px; position: fixed;
            z-index: 10000; left: 50%; bottom: 30px; font-size: 16px; font-weight: bold;
            transform: translateX(-50%); opacity: 0; transition: opacity 0.3s, bottom 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }

    </style>
</head>
<body>

<div class="stars-container"><div class="stars"></div></div>

<div class="container">
    <div class="header">
        <h1>Получи <span class="highlight">БЕСПЛАТНЫЙ</span> разбор матрицы судьбы!</h1>
        <p style="opacity: 0.9; font-size: 15px; margin: 15px 0 0 0;">Напишите мне в Telegram свою дату рождения и имя ✨</p>
        <div class="example">Пример — Мария 16.03.1989</div>
    </div>

    <button class="btn-main" onclick="handleMainClick()">
        <i class="fab fa-telegram-plane"></i> НАПИШИТЕ МНЕ!
    </button>

    <div class="copy-section">
        <div class="copy-title">Или скопируй мой ник и найди меня прямо в поиске Telegram 👇</div>
        <button class="nick-btn" onclick="copyNick()">@diamond_evaa</button>
        <img src="search_preview.png" class="search-preview" alt="Поиск Евы">
    </div>
</div>

<div id="guideOverlay">
    <div class="arrow-top"><i class="fas fa-arrow-up"></i></div>
    <div class="overlay-text">
        <div style="font-size: 50px; margin-bottom: 20px;">⋮</div>
        <b>Шаг 1:</b> Нажми три точки в углу<br><br>
        <b>Шаг 2:</b> Выбери пункт:<br>
        <span style="color: var(--gold); font-size: 22px; border: 1px solid; padding: 10px 20px; border-radius: 12px; display: inline-block; margin-top: 20px; font-weight: bold;">
            ОТКРЫТЬ В БРАУЗЕРЕ
        </span>
    </div>
    <button class="close-btn" onclick="hideGuide()">ПОНЯЛ!</button>
</div>

<div id="toast">Ник скопирован! ✨</div>

<script>
    const tgUrl = "tg://resolve?domain=diamond_evaa";
    const webTgUrl = "https://t.me/diamond_evaa";

    function isRestrictedBrowser() {
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        return (ua.indexOf('TikTok') > -1) || (ua.indexOf('musical_ly') > -1) || (ua.indexOf('App-WebView') > -1);
    }

    window.onload = function() {
        // МГНОВЕННЫЙ редирект вне TikTok
        if (!isRestrictedBrowser()) {
            window.location.href = tgUrl;
            // Подстраховка: если приложение ТГ не установлено, через полторы секунды откроется веб-версия
            setTimeout(() => { window.location.href = webTgUrl; }, 1500); 
        }
    }

    function handleMainClick() {
        if (isRestrictedBrowser()) {
            document.getElementById('guideOverlay').style.display = 'flex';
        } else {
            window.location.href = tgUrl;
        }
    }
    
    function hideGuide() {
        document.getElementById('guideOverlay').style.display = 'none';
    }

    // Улучшенное копирование с показом Toast
    function copyNick() {
        const nick = '@diamond_evaa';
        
        // Создаем временный элемент для копирования
        const tempInput = document.createElement("textarea");
        tempInput.value = nick;
        tempInput.style.position = "fixed";
        tempInput.style.left = "-9999px";
        document.body.appendChild(tempInput);
        
        // Выделяем и копируем
        tempInput.select();
        tempInput.setSelectionRange(0, 99999); // Для мобильных
        
        try {
            document.execCommand("copy");
            showToast(); // Показываем красивое уведомление
        } catch (err) {
            alert('Не удалось скопировать автоматически. Пожалуйста, скопируйте вручную: @diamond_evaa');
        }
        
        // Удаляем временный элемент
        document.body.removeChild(tempInput);
    }

    function showToast() {
        var x = document.getElementById("toast");
        x.className = "show";
        setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
    }
</script>

</body>
</html>
