<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eva | Матрица Судьбы 🔮</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --tg-color: #24A1DE; --bg-dark: #05060a; --gold: #ffd700; --mystic: #7d5fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-dark); color: white; font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh; overflow-x: hidden; text-align: center;
        }

        /* Звездный фон */
        .stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 50%, #161d31 0%, #05060a 100%); }
        .stars { position: absolute; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.4; animation: drift 60s linear infinite; }
        @keyframes drift { from {background-position: 0 0;} to {background-position: 1000px 1000px;} }

        .container { width: 100%; max-width: 380px; padding: 20px; display: flex; flex-direction: column; align-items: center; z-index: 1; }

        .header { margin-bottom: 40px; width: 100%; }
        h1 { font-size: 20px; font-weight: 400; margin: 0; line-height: 1.5; }
        .highlight { 
            color: var(--gold); font-weight: 800; font-size: 24px; text-transform: uppercase; 
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); display: inline-block;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow { from { text-shadow: 0 0 10px var(--gold); } to { text-shadow: 0 0 20px var(--mystic); } }

        /* Пульсирующая кнопка */
        .btn-main { 
            background: linear-gradient(135deg, var(--tg-color), var(--mystic));
            color: white; padding: 22px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; font-size: 18px; display: flex; align-items: center; 
            justify-content: center; gap: 12px; box-shadow: 0 10px 30px rgba(125, 95, 255, 0.4);
            border: none; width: 100%; cursor: pointer; text-transform: uppercase;
            animation: pulseBtn 2s infinite ease-in-out;
        }

        @keyframes pulseBtn {
            0% { transform: scale(1); box-shadow: 0 10px 30px rgba(125, 95, 255, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 15px 45px rgba(125, 95, 255, 0.7); }
            100% { transform: scale(1); box-shadow: 0 10px 30px rgba(125, 95, 255, 0.4); }
        }

        /* Оверлей TikTok */
        #guideOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); z-index: 9999; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            padding: 30px; text-align: center;
        }
        .arrow-top { position: absolute; top: 30px; right: 40px; font-size: 60px; color: var(--gold); animation: point 0.8s infinite alternate; }
        @keyframes point { from { transform: translate(0, 0); } to { transform: translate(10px, -10px); } }
        
        .overlay-text { font-size: 19px; line-height: 1.6; color: white; margin-top: 20px; }
        .close-btn { background: #fff; color: #000; padding: 15px 50px; border-radius: 50px; font-weight: bold; border: none; font-size: 16px; margin-top: 40px; cursor: pointer; }
    </style>
</head>
<body>

<div class="stars-container"><div class="stars"></div></div>

<div class="container">
    <div class="header">
        <h1> Получите <span class="highlight">БЕСПЛАТНЫЙ</span><br>разбор матрицы судьбы! 🔮</h1>
        <p style="opacity: 0.9; font-size: 18px; margin: 20px 0 0 0; line-height: 1.5; font-weight: bold;">Начните новую жизнь! ✨</p>
    </div>

    <button class="btn-main" onclick="handleMainClick()">
        <i class="fab fa-telegram-plane"></i> ПОЛУЧИТЬ РАЗБОР!
    </button>
</div>

<div id="guideOverlay">
    <div class="arrow-top"><i class="fas fa-arrow-up"></i></div>
    <div class="overlay-text">
        <div style="font-size: 50px; margin-bottom: 20px;">⋮</div>
        <b>Шаг 1:</b> Нажмите три точки в углу<br><br>
        <b>Шаг 2:</b> Выберите пункт:<br>
        <span style="color: var(--gold); font-size: 22px; border: 1px solid; padding: 10px 20px; border-radius: 12px; display: inline-block; margin-top: 20px; font-weight: bold;">
            ОТКРЫТЬ В БРАУЗЕРЕ
        </span>
    </div>
    <button class="close-btn" onclick="hideGuide()">ПОНЯЛ!</button>
</div>

<script>
    // Твоя НОВАЯ реферальная ссылка
    const finalRefUrl = "https://t.me/unlo_astro_bot?start=pl_cmp87pqid006w01oemnqp00he";
    // Диплинк для прямого открытия приложения с новой рефкой
    const tgDeepLink = "tg://resolve?domain=unlo_astro_bot&start=pl_cmp87pqid006w01oemnqp00he";

    function isRestrictedBrowser() {
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        return (ua.indexOf('TikTok') > -1) || (ua.indexOf('musical_ly') > -1) || (ua.indexOf('App-WebView') > -1);
    }

    // Авто-переход только в обычном браузере
    window.onload = function() {
        if (!isRestrictedBrowser()) {
            // Пытаемся открыть приложение, если не вышло — открываем через https
            window.location.href = tgDeepLink;
            setTimeout(() => { window.location.href = finalRefUrl; }, 1000); 
        }
    }

    function handleMainClick() {
        if (isRestrictedBrowser()) {
            document.getElementById('guideOverlay').style.display = 'flex';
        } else {
            window.location.href = finalRefUrl;
        }
    }
    
    function hideGuide() {
        document.getElementById('guideOverlay').style.display = 'none';
    }
</script>

</body>
</html>
